<!DOCTYPE html>
<html>
<head>
  <title>Edvárd Nagy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial;
      background: #f5f5f7;
      color: #1d1d1f;
      overflow-x: hidden;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 100px 20px;
      position: relative;
      z-index: 2;
    }

    h1 {
      font-size: 54px;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 18px;
      color: #6e6e73;
      margin-bottom: 60px;
    }

    h2 {
      margin-top: 80px;
      font-size: 22px;
      font-weight: 500;
    }

    /* ✨ accent line */
    .line {
      width: 60px;
      height: 4px;
      background: linear-gradient(90deg, #007aff, #5ac8fa);
      border-radius: 2px;
      margin: 10px 0 25px;
    }

    /* 🔥 skills */
    .skills {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .skill {
      background: white;
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 14px;
      color: #333;
      box-shadow: 0 6px 20px rgba(0,0,0,0.06);
      transition: 0.25s;
      cursor: default;
    }

    .skill:hover {
      transform: translateY(-4px) scale(1.05);
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    /* 🌈 background blobs */
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.4;
      z-index: 1;
    }

    .blob1 {
      width: 300px;
      height: 300px;
      background: #007aff;
      top: 50px;
      right: -100px;
    }

    .blob2 {
      width: 250px;
      height: 250px;
      background: #5ac8fa;
      bottom: 100px;
      left: -120px;
    }

    /* subtle grid */
    .grid {
      position: absolute;
      width: 100%;
      height: 100%;
      background-image: linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 0;
    }

    @media(max-width: 700px) {
      h1 {
        font-size: 36px;
      }
    }
  </style>
</head>

<body>

<div class="grid"></div>

<div class="blob blob1"></div>
<div class="blob blob2"></div>

<div class="container">

  <h1>Edvárd Nagy</h1>
  <div class="subtitle">
    Electronics Engineering · Robotics · IoT
  </div>

  <h2>Core Skills</h2>
  <div class="line"></div>

  <div class="skills">
    <div class="skill">Embedded Systems</div>
    <div class="skill">ESP32 / Arduino</div>
    <div class="skill">C / C++</div>
    <div class="skill">MQTT (HiveMQ)</div>
    <div class="skill">IoT Systems</div>
    <div class="skill">Raspberry Pi</div>
    <div class="skill">Electronics Design</div>
    <div class="skill">Battery Systems</div>
    <div class="skill">3D Printing</div>
    <div class="skill">Fusion 360 / CAD</div>
    <div class="skill">Robotics</div>
    <div class="skill">Web Interfaces</div>
  </div>

</div>

</body>
</html>
