<!DOCTYPE html>
<html>
<head>
  <title>Edvárd Nagy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial;
      background: #f5f5f7;
      color: #1d1d1f;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 80px 20px;
    }

    h1 {
      font-size: 52px;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 18px;
      color: #6e6e73;
      margin-bottom: 40px;
    }

    h2 {
      margin-top: 80px;
      font-size: 22px;
      font-weight: 500;
    }

    /* 🔵 accent line */
    .line {
      width: 60px;
      height: 4px;
      background: linear-gradient(90deg, #007aff, #5ac8fa);
      border-radius: 2px;
      margin: 10px 0 20px;
    }

    /* ✨ skills pills */
    .skills {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .skill {
      background: white;
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 14px;
      color: #333;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      transition: 0.2s;
    }

    .skill:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 16px rgba(0,0,0,0.08);
    }

    /* subtle floating circle */
    .bg-circle {
      position: absolute;
      top: 100px;
      right: -100px;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, #dbeafe, transparent);
      border-radius: 50%;
      z-index: -1;
    }

    @media(max-width: 700px) {
      h1 {
        font-size: 36px;
      }
    }
  </style>
</head>

<body>

<div class="bg-circle"></div>

<div class="container">

  <h1>Edvárd Nagy</h1>
  <div class="subtitle">
    Electronics Engineering · Robotics · IoT
  </div>

  <h2>Core Skills</h2>
  <div class="line"></div>

  <div class="skills">
    <div class="skill">Embedded Systems</div>
    <div class="skill">ESP32 / Arduino</div>
    <div class="skill">C / C++</div>
    <div class="skill">MQTT (HiveMQ)</div>
    <div class="skill">IoT Systems</div>
    <div class="skill">Raspberry Pi</div>
    <div class="skill">Electronics Design</div>
    <div class="skill">Battery Systems</div>
    <div class="skill">3D Printing</div>
    <div class="skill">Fusion 360 / CAD</div>
    <div class="skill">Robotics</div>
    <div class="skill">Web Interfaces</div>
  </div>

</div>

</body>
</html>
